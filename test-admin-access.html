<!DOCTYPE html>
<html>
<head>
    <title>Admin Login Test</title>
</head>
<body>
    <h1>Testing Admin Access</h1>
    <button onclick="loginAsAdmin()">Login as Admin</button>
    <button onclick="goToScraper()">Go to Scraper Page</button>
    <div id="status"></div>

    <script>
        function loginAsAdmin() {
            const adminUser = {
                id: 'admin-1',
                email: 'admin@danesh.edu',
                name: 'Admin User',
                role: 'ADMIN',
                roles: ['ADMIN'],
                tier: 'PREMIUM'
            };
            
            localStorage.setItem('auth_user', JSON.stringify(adminUser));
            localStorage.setItem('user_id', adminUser.id);
            
            document.getElementById('status').innerHTML = '<p style="color: green;">Logged in as Admin!</p>';
        }

        function goToScraper() {
            window.location.href = '/en/admin/scraper';
        }
    </script>
</body>
</html>
